services:
  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    expose:
      - "6379"

  mcp-dummy:
    build:
      context: ./mcp-dummy
      dockerfile: Dockerfile
    container_name: mcp-dummy
    expose:
      - "9000"

  mcp-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: mcp-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/config.example.yml:/config/config.yml:ro
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_KEY_PREFIX=mcp-gateway:compose
    depends_on:
      - redis
      - mcp-dummy
