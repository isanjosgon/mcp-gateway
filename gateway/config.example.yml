server:
  host: 0.0.0.0
  port: 8080
  path: /mcp
  allowedOrigins:
    - "http://localhost:3000"
    - "https://app.your-domain.com"

auth:
  mode: apiKey
  apiKeys:
    - key: "dev_key_1"
      tenant: "client"
      client: "local-dev"

rateLimit:
  # Set REDIS_URL=redis://... to share limits across gateway instances.
  # Without REDIS_URL, the gateway uses in-memory rate limit buckets.
  # Override keyPrefix with RATE_LIMIT_KEY_PREFIX to separate environments.
  keyPrefix: "mcp-gateway"
  defaultRpm: 600
  byMethod:
    "tools/call": 120

policy:
  default: deny
  rules:
    - subject:
        tenant: "client"
        client: "local-dev"
      allow:
        methods:
          - "initialize"
          - "tools/list"
          - "tools/call"
          - "resources/list"
          - "resources/read"
          - "prompts/list"
          - "prompts/get"
        tools: ["*"]
        resources: ["*"]
        prompts: ["*"]

upstreams:
  - name: mcp-local
    type: http
    url: "http://mcp-dummy:9000/mcp"
    timeoutMs: 30000

upstreamHeaders:
  # Only these request headers are forwarded to upstream MCP servers.
  # Gateway credentials such as Authorization, X-API-Key, and Api-Key are never forwarded.
  forward:
    - "accept"
    - "content-type"
    - "mcp-session-id"
    - "mcp-protocol-version"
    - "last-event-id"

routing:
  - match: { method: "*" }
    upstream: "mcp-local"

audit:
  enabled: true
  # Environment is resolved from MCP_GATEWAY_ENV, then NODE_ENV, then "development".
  # Use ["*"] to log audit events in all environments.
  environments: ["production", "staging"]

logging:
  level: "info"
  redactKeys:
    - "authorization"
    - "x-api-key"
    - "api-key"
    - "token"
    - "access_token"
    - "password"
    - "secret"
