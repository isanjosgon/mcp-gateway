server:
  host: 0.0.0.0
  port: 8080
  path: /mcp
  allowedOrigins:
    - "http://localhost:3000"
    - "https://app.your-domain.com"
  # Requests without an Origin header are allowed by default for non-browser clients.
  # Set to true to reject requests that omit Origin.
  requireOrigin: false

auth:
  mode: apiKey
  apiKeys:
    - id: "local-dev-key"
      # Use keyHash in production. Plain key is convenient for local development.
      # Plain keys can use ${ENV_VAR} placeholders resolved at startup.
      key: "${MCP_LOCAL_API_KEY}"
      # keyHash: "sha256:REPLACE_WITH_SHA256_HEX_OF_THE_API_KEY"
      tenant: "client"
      client: "local-dev"

rateLimit:
  # Set REDIS_URL=redis://... to share limits across gateway instances.
  # Without REDIS_URL, the gateway uses in-memory rate limit buckets.
  # Override keyPrefix with RATE_LIMIT_KEY_PREFIX to separate environments.
  keyPrefix: "mcp-gateway"
  defaultRpm: 600
  byMethod:
    "tools/call": 120

policy:
  default: deny
  rules:
    - subject:
        tenant: "client"
        client: "local-dev"
      allow:
        methods:
          - "initialize"
          - "tools/list"
          - "tools/call"
          - "resources/list"
          - "resources/read"
          - "prompts/list"
          - "prompts/get"
        tools: ["*"]
        resources: ["*"]
        prompts: ["*"]

upstreams:
  - name: mcp-local
    type: http
    url: "http://mcp-dummy:9000/mcp"
    timeoutMs: 30000
    # Optional upstream authentication. This is generated by the gateway and is
    # separate from the client credentials used to authenticate at the gateway.
    # auth:
    #   type: apiKey
    #   apiKey:
    #     header: "Authorization"
    #     value: "Api-Key ${MCP_LOCAL_API_KEY}"

upstreamHeaders:
  # Only these request headers are forwarded to upstream MCP servers.
  # Gateway credentials such as Authorization, X-API-Key, and Api-Key are never forwarded.
  forward:
    - "accept"
    - "content-type"
    - "mcp-session-id"
    - "mcp-protocol-version"
    - "last-event-id"

routing:
  - match: { method: "*" }
    upstream: "mcp-local"

audit:
  enabled: true
  # Environment is resolved from MCP_GATEWAY_ENV, then NODE_ENV, then "development".
  # Use ["*"] to log audit events in all environments.
  environments: ["production", "staging"]

logging:
  level: "info"
  redactKeys:
    - "authorization"
    - "x-api-key"
    - "api-key"
    - "token"
    - "access_token"
    - "password"
    - "secret"
