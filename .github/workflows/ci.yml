name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gateway/package-lock.json

      - name: Install
        run: npm ci

      - name: Validate example config
        run: npm run validate

      - name: Print routes (debug)
        run: npm run routes
