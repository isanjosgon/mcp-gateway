name: Release Gateway to NPM

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semver bump to apply before publishing"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate example config
        run: npm run validate

      - name: Print routes
        run: npm run routes

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump gateway version
        id: version
        run: |
          npm version "$RELEASE_TYPE" -w gateway --no-git-tag-version
          npm install --package-lock-only --ignore-scripts

          VERSION="$(node -p "require('./gateway/package.json').version")"
          TAG="v${VERSION}"

          if npm view "@isanjosgon/mcp-gateway@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already exists on npm." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit release version
        run: |
          git add gateway/package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish gateway package
        run: npm publish -w gateway --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target main \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
